<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付费内容发送</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; min-height: 100vh; padding: 24px 16px; color: #e2e8f0; }
    .container { max-width: 860px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    h1 { color: #f1f5f9; font-size: 28px; margin: 0; }
    .subtitle { color: #94a3b8; font-size: 14px; margin: 4px 0 0; }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; font-size: 15px; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-blue { background: #3b82f6; }
    .btn-green { background: #22c55e; }
    .btn-purple { background: #8b5cf6; }
    .btn-gray { background: #334155; }
    .status { padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: none; }
    .status-success { background: #065f46; color: #a7f3d0; display: block; }
    .status-error { background: #7f1d1d; color: #fecaca; display: block; }
    .loading { text-align: center; padding: 80px; }
    .loading-icon { font-size: 48px; margin-bottom: 16px; }
    .info-text { color: #94a3b8; font-size: 13px; margin-bottom: 16px; }
    .card { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px; padding: 32px 28px; margin-bottom: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .card-num { background: #3b82f6; color: #fff; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; flex-shrink: 0; }
    .card-title { color: #f1f5f9; font-size: 22px; margin: 0; font-weight: 700; }
    .section-title { color: #60a5fa; font-weight: 700; font-size: 15px; margin-bottom: 8px; margin-top: 20px; }
    .section-box { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 16px; margin-top: 6px; line-height: 1.8; font-size: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .tag { color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; display: inline-block; margin-right: 8px; margin-bottom: 6px; }
    .tag-purple { background: #7c3aed; }
    .tag-green { background: #059669; }
    .tag-orange { background: #d97706; }
    .footer { text-align: center; padding: 40px 0; color: #64748b; font-size: 13px; }
    .footer p { margin-top: 8px; }
    @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📬 付费内容发送</h1>
        <p class="subtitle">深度分析 · 5条机会 + 完整SOP + 工具栈 + 避坑</p>
      </div>
      <div class="btn-group">
        <button class="btn btn-blue" onclick="fetchContent()">🔄 重新分析</button>
        <button class="btn btn-green" id="btnCopy" onclick="copyContent()" disabled>📋 一键复制</button>
        <button class="btn btn-purple" id="btnPush" onclick="pushFeishu()" disabled>📤 推飞书</button>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="content">
      <div class="loading">
        <div class="loading-icon">⏳</div>
        <p style="color:#94a3b8;font-size:18px;">正在分析行业动态...</p>
        <p style="color:#64748b;font-size:14px;margin-top:8px;">提取可执行机会 + 生成SOP + 匹配工具栈</p>
      </div>
    </div>
  </div>

  <script>
    let paidData = [];

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status status-' + type;
    }

    async function fetchContent() {
      document.getElementById('content').innerHTML = '<div class="loading"><div class="loading-icon">⏳</div><p style="color:#94a3b8;font-size:18px;">正在分析行业动态...</p><p style="color:#64748b;font-size:14px;margin-top:8px;">提取可执行机会 + 生成SOP + 匹配工具栈</p></div>';
      document.getElementById('btnCopy').disabled = true;
      document.getElementById('btnPush').disabled = true;
      
      try {
        const res = await fetch('/api/daily-report?tier=paid');
        const data = await res.json();
        paidData = data.report?.opportunities || [];
        
        if (paidData.length === 0) {
          showStatus('⚠️ 今日未抓到机会，使用了备用范例', 'error');
        } else {
          showStatus('✅ 分析完成 · 今日 ' + paidData.length + ' 条掘金机会', 'success');
        }
        
        document.getElementById('btnCopy').disabled = false;
        document.getElementById('btnPush').disabled = false;
        renderCards();
      } catch (e) {
        showStatus('❌ 获取失败：' + e.message + '。请检查后端是否正常运行。', 'error');
        document.getElementById('content').innerHTML = '';
      }
    }

    function renderCards() {
      let html = '<p class="info-text">📅 ' + new Date().toLocaleDateString('zh-CN') + ' · 共 ' + paidData.length + ' 条机会</p>';
      
      paidData.forEach(function(opp, i) {
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-num">' + (i+1) + '</span><h2 class="card-title">' + escapeHtml(opp.title || '') + '</h2></div>';
        
        html += '<div class="section-title">💡 为什么能做 & 怎么做</div>';
        html += '<div class="section-box">' + escapeHtml(opp.idea || '') + '</div>';
        
        html += '<div class="grid-2">';
        html += '<div><div class="section-title">🎯 精准客户</div><div class="section-box">' + escapeHtml(opp.target || '') + '</div></div>';
        html += '<div><div class="section-title">⚡ 成本 & 难度</div><div class="section-box"><div style="margin-bottom:6px">💰 ' + escapeHtml(opp.cost || '') + '</div><div>' + escapeHtml(opp.difficulty || '') + '</div></div></div>';
        html += '</div>';
        
        html += '<div class="section-title">📈 收入潜力</div>';
        html += '<div class="section-box">' + escapeHtml(opp.revenue || '') + '</div>';
        
        html += '<div class="section-title">📋 5步行动清单</div>';
        html += '<div class="section-box">';
        (opp.actions || []).forEach(function(a) { html += '<div style="margin-bottom:6px">✔ ' + escapeHtml(a) + '</div>'; });
        html += '</div>';
        
        html += '<div class="section-title">📝 7天执行SOP</div>';
        html += '<div class="section-box">' + escapeHtml(opp.sop || '暂无') + '</div>';
        
        html += '<div class="grid-2">';
        html += '<div><div class="section-title">🛠 推荐工具栈</div><div class="section-box">' + escapeHtml(opp.tools || '暂无') + '</div></div>';
        html += '<div><div class="section-title">⚠️ 避坑指南</div><div class="section-box" style="border-left:3px solid #f87171">' + escapeHtml(opp.pitfall || '暂无') + '</div></div>';
        html += '</div>';
        
        html += '<div style="margin-top:16px">';
        html += '<span class="tag tag-purple">可执行</span><span class="tag tag-green">低风险</span><span class="tag tag-orange">高回报</span>';
        html += '</div></div>';
      });
      
      html += '<div class="footer"><p>━━━ 付费版 END · 明日继续 ━━━</p><p>以上内容由AI深度分析生成 · 人工审核把关</p></div>';
      document.getElementById('content').innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyContent() {
      var text = '';
      text += '━━━━━━━━━━━━━━━━━━━━\n';
      text += '🚀 独立开发者掘金简报 · 付费版\n';
      text += '📅 ' + new Date().toLocaleDateString('zh-CN') + '\n';
      text += '━━━━━━━━━━━━━━━━━━━━\n\n';
      
      paidData.forEach(function(opp, i) {
        text += '┏━━━━ 机会 ' + (i+1) + '/' + paidData.length + ' ━━━━┓\n\n';
        text += '🔥 ' + opp.title + '\n\n';
        text += '💡 为什么能做 & 怎么做\n' + opp.idea + '\n\n';
        text += '🎯 精准客户画像\n' + opp.target + '\n\n';
        text += '💰 收入潜力\n' + opp.revenue + '\n\n';
        text += '⚡ 启动成本 & 难度\n' + opp.cost + '\n' + opp.difficulty + '\n\n';
        text += '📋 5步行动清单\n' + (opp.actions||[]).map(function(a,i){return '  '+(i+1)+'. '+a;}).join('\n') + '\n\n';
        text += '📝 7天执行SOP\n' + (opp.sop||'暂无') + '\n\n';
        text += '🛠 推荐工具栈\n' + (opp.tools||'暂无') + '\n\n';
        text += '⚠️ 避坑指南\n' + (opp.pitfall||'暂无') + '\n\n';
        text += '━━━━━━━━━━━━━━━━━━━━\n\n';
      });
      
      navigator.clipboard.writeText(text).then(function() {
        showStatus('✅ 已复制全部内容，直接粘贴发给客户', 'success');
      }).catch(function() {
        showStatus('❌ 复制失败，请手动选择复制', 'error');
      });
    }

    async function pushFeishu() {
      try {
        const res = await fetch('/api/feishu', { method: 'POST' });
        const data = await res.json();
        showStatus(data.success ? '✅ 已推送到飞书群' : '❌ ' + (data.error||'失败'), data.success ? 'success' : 'error');
      } catch(e) {
        showStatus('❌ ' + e.message, 'error');
      }
    }

    // 删除 React admin 路由，改用静态 HTML
    async function cleanupOldRoute() {
      try { await fetch('/api/cleanup', { method: 'POST' }); } catch(e) {}
    }

    // 自动加载
    fetchContent();
  </script>
</body>
</html>
